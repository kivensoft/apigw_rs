# rustfmt.toml
edition = "2024"
max_width = 100                     # 行宽限制
array_width = 80                    # 数组宽度
chain_width = 80                    # 链式调用宽度
fn_call_width = 80                  # 函数调用参数宽度
struct_lit_width = 80               # 结构体字面量宽度

#blank_lines_upper_bound = 3         # 连续空行的最大数量
#brace_style = "SameLineWhere"       # 花括号风格

#wrap_comments = true                # 自动换行注释
#comment_width = 80                  # 注释最大宽度
#format_strings = true               # 格式化字符串字面量

fn_params_layout = "Compressed"     # 参数布局: Tall, Compressed, Vertical

#imports_granularity = "Crate"       # 导入合并粒度: One, Module, Item, Crate
#group_imports = "StdExternalCrate"  # 分组策略: One, StdExternalCrate, One
reorder_imports = true              # 排序导入
reorder_modules = true              # 排序模块声明

#struct_field_align_threshold = 3    # 字段对齐阈值(0=不对齐)
#enum_discrim_align_threshold = 3    # 枚举值对齐
#match_arm_blocks = true             # match 分支使用块
match_block_trailing_comma = true   # match 块尾随逗号

#spaces_around_ranges = false        # 范围操作符空格: 1..2 vs 1 .. 2
#space_before_colon = false          # 冒号前空格
#space_after_colon = true            # 冒号后空格
#type_punctuation_density = "Wide"   # 类型标点密度: Wide, Compressed

#format_macro_matchers = true        # 格式化宏匹配器
#format_macro_bodies = true          # 格式化宏体
#skip_macro_invocations = ["vec"]    # 跳过指定宏
